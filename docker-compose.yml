version: '3.8'

services:
  booklibrary:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY:-}
    volumes:
      - booklibrary_data:/app/books.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  booklibrary_data:
